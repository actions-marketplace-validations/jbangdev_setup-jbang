name: Test

on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: 'JBang Latest, Java ${{ matrix.java }}, ${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        java: [ 11, 17, 20 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - uses: actions/setup-java@b6e674f4b717d7b0ae3baee0fbe79f498905dfde # v1
        with:
          java-version: ${{ matrix.java }}

      - uses: ./
        with:
          arguments: version

      - shell: bash
        run: |
          jbang version
